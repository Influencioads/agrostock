# AgroTraders — full production stack (backing services + all apps).
# Build context is the repo root, so run from there:
#   docker compose --env-file .env -f infra/docker-compose.prod.yml up -d --build
# Run DB migrations explicitly during deploy:
#   docker compose --env-file .env -f infra/docker-compose.prod.yml run --rm migrate
#
name: agrostock-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    cpus: '1.0'
    mem_limit: 768m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
    ports:
      # local-only so bots cannot scan the database port from the internet
      - '127.0.0.1:5546:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    cpus: '0.25'
    mem_limit: 128m
    volumes:
      - redis_data:/data
    # OPS-03: readiness gate so dependents wait for a responsive Redis.
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    cpus: '0.50'
    mem_limit: 512m
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    # OPS-03: MinIO's own liveness endpoint.
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  api:
    image: agrostock-prod-api
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    cpus: '1.0'
    mem_limit: 768m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      API_PORT: 3000
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?Set S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?Set S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:?Set S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS}
      UPLOAD_DIR: /repo/apps/api/uploads
      PRIVATE_UPLOAD_DIR: /repo/apps/api/private-uploads
    ports:
      - '127.0.0.1:${HOST_API_PORT:-3100}:3000'
    volumes:
      - api_uploads:/repo/apps/api/uploads
      - api_private_uploads:/repo/apps/api/private-uploads
    # OPS-03: the DB-gated readiness endpoint the API already exposes was never
    # consumed — a wedged API (bad DB creds, pending migrations) stayed "up"
    # forever. Now docker marks it unhealthy and dependents wait for it.
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health/ready']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  migrate:
    image: agrostock-prod-api
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    profiles: ['tools']
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}?schema=public
    entrypoint: ['npx', 'prisma', 'migrate', 'deploy']
    restart: 'no'

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL to the public HTTPS API origin}
    restart: unless-stopped
    cpus: '0.25'
    mem_limit: 128m
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '127.0.0.1:${HOST_WEB_PORT:-8090}:80'
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

  admin:
    build:
      context: ..
      dockerfile: infra/Dockerfile.admin
      args:
        VITE_API_URL: ${VITE_API_URL:?Set VITE_API_URL to the public HTTPS API origin}
    restart: unless-stopped
    cpus: '0.25'
    mem_limit: 128m
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '127.0.0.1:${HOST_ADMIN_PORT:-8091}:80'
    logging:
      driver: json-file
      options: { max-size: '10m', max-file: '3' }

volumes:
  postgres_data:
  redis_data:
  minio_data:
  api_uploads:
  api_private_uploads:
