# AgroTraders — local development infrastructure.
# Uses distinct host ports (55xx/63xx/91xx) and compose-namespaced container
# names to avoid colliding with other local projects.
#
#   docker compose -f infra/docker-compose.yml up -d
#
name: agrostock

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agrostock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agrostock}
      POSTGRES_DB: ${POSTGRES_DB:-agrostock}
    ports:
      - '5544:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-agrostock}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-agrostock}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-agrostock-secret}
    ports:
      - '9100:9000'
      - '9101:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 15s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - '8081:8080'
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  minio_data:
