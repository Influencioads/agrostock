server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SEC-03: security headers for the SPA documents. TLS is terminated by the host
  # reverse proxy, so responses reach the browser over HTTPS and HSTS is honored.
  #  - frame-ancestors/X-Frame-Options: block clickjacking of the admin console.
  #  - nosniff: stop MIME sniffing.
  #  - Referrer-Policy: don't leak full URLs cross-origin.
  # CSP is deliberately compatible with the build: self-hosted JS, inline styles
  # (framer-motion / Tailwind), Google Fonts, and API/WebSocket calls to any HTTPS
  # origin (the API origin is env-specific and not known to nginx). Tighten
  # connect-src to the concrete API origin at the host proxy where it is known.
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

  # SPA fallback — let React Router handle client-side routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # cache hashed assets aggressively (add_header here resets inherited headers;
  # re-assert nosniff on the static bundles).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    add_header X-Content-Type-Options "nosniff" always;
  }

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
}
