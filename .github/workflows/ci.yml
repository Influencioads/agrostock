name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # OPS-04: --frozen-lockfile so a stale pnpm-lock.yaml fails CI instead of
      # silently resolving new versions — green CI now proves the committed
      # lockfile builds.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @agrotraders/api exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # OPS-04: catch schema.prisma ↔ migrations drift against a real Postgres. Given
  # the project's documented `db push` history this is a live risk — a mismatch
  # would otherwise merge silently and only surface on the next `migrate deploy`.
  migrations:
    name: Migration drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: agrotraders_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci -d agrotraders_ci"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/agrotraders_ci?schema=public
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Replay the committed migrations onto a clean DB…
      - name: Apply migrations
        run: pnpm --filter @agrotraders/api exec prisma migrate deploy
      # …then assert no further migration is needed for the current schema.
      - name: Assert no schema drift
        run: pnpm --filter @agrotraders/api exec prisma migrate diff
          --from-migrations apps/api/prisma/migrations
          --to-schema-datamodel apps/api/prisma/schema.prisma
          --shadow-database-url "$DATABASE_URL"
          --exit-code

  # OPS-04: build the Docker images on PRs too, so a broken Dockerfile is caught
  # before merge rather than only on push to main.
  docker:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        app: [api, web, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.app }} image
        run: docker build -f infra/Dockerfile.${{ matrix.app }} -t agrotraders-${{ matrix.app }}:ci .
